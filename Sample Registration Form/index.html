<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a88388f2ee.js" crossorigin="anonymous"></script>
    <title>Sample Registration Form</title>
</head>
<body>
    <div class="container">
        <h1>Registration</h1>
        <hr>
        <br>
        <form id="org-type">
        <input type="radio" name="org">Personal
        <input type="radio" name="org">Company
        <br>
        <br>
        <hr>
        <br>
            <label for="Email" class="labels"><i class="fa-solid fa-envelope"></i></label>
            <input type="email" placeholder="Email" class="text">
            <br>
            <label for="Name" class="labels"><i class="fa-solid fa-user"></i></label>
            <input type="text" placeholder="Name" class="text">
            <br>
            <label for="Password" class="labels"><i class="fa-solid fa-unlock"></i></label>
            <input type="password" placeholder="Password" class="text">
            <br>
        <br>
        <hr>
        <br>
            <input type="radio" name="gender">Male
            <input type="radio" name="gender">Female
        </form>
        <br>
        <hr>
        <br>
        <button type="submit">Submit</button>
    </div>
</body>
</html>
